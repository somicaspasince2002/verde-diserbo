<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SO.MI.CA. S.p.A. — Verde &amp; Diserbo</title>
<style>
:root{--verde:#1a5c2a;--verde-light:#2d8a44;--verde-pale:#e8f5ec;--arancio:#d4500a;--arancio-light:#f06820;--grigio:#2c2c2c;--grigio-mid:#5a5a5a;--grigio-light:#f2f2f2;--bianco:#fff;--bordo:#d0d0d0;--rosso:#c0392b;--blu:#1a4a8a;--giallo:#f39c12;--shadow:0 2px 8px rgba(0,0,0,0.12);--radius:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f0;color:var(--grigio);min-height:100vh;}
#app-header{background:var(--verde);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.25);position:sticky;top:0;z-index:100;}
#app-header .logo-area{display:flex;align-items:center;gap:10px;}
#app-header img{height:38px;background:#fff;border-radius:4px;padding:2px 6px;}
#app-header h1{font-size:1.05rem;font-weight:700;line-height:1.2;}
#app-header h1 small{font-size:0.72rem;font-weight:400;opacity:.85;display:block;}
#header-right{display:flex;align-items:center;gap:8px;}
#user-badge{font-size:.75rem;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;cursor:pointer;}
#logout-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:.8rem;}
#logout-btn:hover{background:rgba(255,255,255,.35);}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a5c2a 0%,#2d8a44 50%,#1a5c2a 100%);}
.login-card{background:#fff;border-radius:16px;padding:36px 32px;width:340px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.25);}
.login-card .logo-wrap{text-align:center;margin-bottom:20px;}
.login-card img{height:50px;margin-bottom:10px;}
.login-card h2{text-align:center;color:var(--verde);font-size:1.1rem;margin-bottom:4px;}
.login-card p{text-align:center;color:var(--grigio-mid);font-size:.8rem;margin-bottom:24px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--grigio-mid);margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bordo);border-radius:var(--radius);font-size:.95rem;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--verde);}
.btn{display:inline-block;padding:10px 20px;border:none;border-radius:var(--radius);cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;}
.btn-verde{background:var(--verde);color:#fff;}.btn-verde:hover{background:var(--verde-light);}
.btn-arancio{background:var(--arancio);color:#fff;}.btn-arancio:hover{background:var(--arancio-light);}
.btn-grigio{background:#e0e0e0;color:var(--grigio);}.btn-grigio:hover{background:#ccc;}
.btn-rosso{background:var(--rosso);color:#fff;}.btn-rosso:hover{background:#a93226;}
.btn-blu{background:var(--blu);color:#fff;}.btn-blu:hover{background:#1a5cb8;}
.btn-full{width:100%;}.btn-sm{padding:6px 12px;font-size:.8rem;}.btn-lg{padding:14px 20px;font-size:1rem;}
#main-nav{background:#fff;border-bottom:2px solid var(--verde-pale);display:flex;overflow-x:auto;}
.nav-tab{padding:12px 20px;font-size:.88rem;font-weight:600;color:var(--grigio-mid);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s;}
.nav-tab.active{color:var(--verde);border-bottom-color:var(--verde);}
.nav-tab:hover{background:var(--verde-pale);}
#main-content{padding:16px;max-width:960px;margin:0 auto;}
.module-selector{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.module-card{background:#fff;border:2px solid var(--bordo);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;}
.module-card:hover,.module-card.active{border-color:var(--verde);background:var(--verde-pale);}
.module-card .icon{font-size:2.2rem;margin-bottom:8px;}
.module-card h3{font-size:.95rem;color:var(--verde);}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
.card-title{font-size:1rem;font-weight:700;color:var(--verde);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--verde-pale);}
.reg-form .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.reg-form .form-row{grid-template-columns:1fr;}.module-selector{grid-template-columns:1fr;}}
.checklist{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;border:1px solid var(--bordo);border-radius:var(--radius);padding:8px;}
.checklist label{display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:.88rem;padding:4px 6px;border-radius:4px;}
.checklist label:hover{background:var(--verde-pale);}
.checklist input[type=checkbox]{width:18px;height:18px;margin-top:1px;cursor:pointer;flex-shrink:0;accent-color:var(--verde);}
.sub-field{margin:6px 0 6px 26px;padding:8px;background:#f9f9f9;border-radius:6px;border-left:3px solid var(--verde-light);}
.sub-field label{font-size:.82rem;font-weight:600;color:var(--grigio-mid);display:block;margin-bottom:4px;}
.sub-field textarea{width:100%;padding:7px;border:1px solid var(--bordo);border-radius:5px;font-size:.85rem;resize:vertical;}
.radio-group{display:flex;gap:12px;flex-wrap:wrap;}
.radio-group label{display:flex;align-items:center;gap:5px;font-size:.85rem;cursor:pointer;font-weight:400;}
.stato-flags{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px;}
.stato-flag{display:flex;align-items:center;gap:6px;padding:8px 14px;border:2px solid var(--bordo);border-radius:20px;cursor:pointer;font-size:.88rem;}
.stato-flag input{accent-color:var(--verde);width:16px;height:16px;}
.data-table{width:100%;border-collapse:collapse;font-size:.83rem;}
.data-table th{background:var(--verde);color:#fff;padding:8px 10px;text-align:left;white-space:nowrap;}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--verde-pale);vertical-align:top;}
.data-table tr:hover td{background:#f5faf6;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600;}
.badge-verde{background:#d4efdf;color:#1e8449;}.badge-giallo{background:#fdebd0;color:#ca6f1e;}.badge-rosso{background:#fadbd8;color:#922b21;}
.filter-bar{background:#fff;border-radius:var(--radius);padding:12px;margin-bottom:14px;box-shadow:var(--shadow);}
.filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;align-items:end;}
.filter-grid select,.filter-grid input{width:100%;padding:7px 10px;border:1.5px solid var(--bordo);border-radius:6px;font-size:.83rem;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
.stat-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--verde);}
.stat-card .num{font-size:1.9rem;font-weight:800;color:var(--verde);}
.stat-card .lbl{font-size:.75rem;color:var(--grigio-mid);margin-top:2px;}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:20px;}
.admin-section-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);}
.admin-section-card h4{font-size:.9rem;font-weight:700;color:var(--verde);margin-bottom:10px;border-bottom:1px solid var(--verde-pale);padding-bottom:6px;}
.admin-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:.82rem;}
.admin-item:last-child{border-bottom:none;}
.admin-item .item-name{flex:1;}
.admin-item .item-actions{display:flex;gap:4px;}
.add-form{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.add-form input,.add-form select{flex:1;min-width:80px;padding:7px 10px;border:1.5px solid var(--bordo);border-radius:6px;font-size:.83rem;}
.alert{padding:10px 14px;border-radius:var(--radius);margin-bottom:12px;font-size:.88rem;}
.alert-success{background:#d4efdf;color:#1e8449;border-left:4px solid #27ae60;}
.alert-error{background:#fadbd8;color:#922b21;border-left:4px solid var(--rosso);}
.hidden{display:none!important;}
.text-center{text-align:center;}.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}
.flex-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.text-small{font-size:.8rem;color:var(--grigio-mid);}
.op-big-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
@media(max-width:480px){.op-big-grid{grid-template-columns:1fr;}}
.op-big-btn{background:#fff;border:2.5px solid var(--verde);border-radius:12px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.op-big-btn:hover{background:var(--verde);}.op-big-btn:hover h3{color:#fff;}
.op-big-btn .icon{font-size:2rem;margin-bottom:6px;display:block;}
.op-big-btn h3{font-size:.92rem;font-weight:700;color:var(--verde);}
@media print{
  @page{size:A4 landscape;margin:10mm 8mm 10mm 8mm;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  #app-header,#main-nav,.no-print,button,.filter-bar{display:none!important;}
  body{background:#fff!important;font-size:9pt;color:#000;}
  #main-content{padding:0!important;max-width:100%!important;}
  .print-header{display:block!important;}
  .card{box-shadow:none!important;border:1px solid #ccc!important;margin-bottom:8px!important;padding:8px!important;}
  .stats-grid{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:6px!important;margin-bottom:8px!important;}
  .stat-card{padding:6px!important;border-top-width:3px!important;}
  .stat-card .num{font-size:1.2rem!important;}
  .stat-card .lbl{font-size:.62rem!important;}
  .data-table{width:100%!important;border-collapse:collapse!important;font-size:7.5pt!important;table-layout:fixed;}
  .data-table th{background:#1a5c2a!important;color:#fff!important;padding:4px 5px!important;font-size:7.5pt!important;text-align:left;white-space:normal!important;}
  .data-table td{padding:3px 5px!important;border-bottom:1px solid #ddd!important;vertical-align:top!important;word-break:break-word!important;white-space:normal!important;}
  .data-table tr:nth-child(even) td{background:#f5faf6!important;}
  .badge,.badge-verde,.badge-giallo,.badge-rosso,.badge-bozza,.badge-inviato,.badge-approvato{font-size:6.5pt!important;padding:1px 4px!important;}
  .print-header{margin-bottom:10px!important;}
  .hidden{display:none!important;}
  /* UTC: nascondi nomi, mostra solo conteggio */
  body.utc-print .ops-names{display:none!important;}
  body.utc-print .ops-count{display:inline!important;}
  /* Admin: mostra nomi, nascondi conteggio */
  body:not(.utc-print) .ops-count{display:none!important;}
}
.print-header{display:none;text-align:center;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--verde);}
.print-header img{height:50px;margin-bottom:4px;}
.print-header .intestazione{font-size:.68rem;color:#555;line-height:1.5;margin-top:4px;}
.print-header h2{font-size:1rem;margin-top:8px;}
/* BOZZE E NOTIFICHE */
.badge-bozza{background:#fff3cd;color:#856404;border:1.5px solid #ffc107;padding:2px 10px;border-radius:10px;font-size:.75rem;font-weight:700;}
.badge-inviato{background:#d1ecf1;color:#0c5460;border:1.5px solid #17a2b8;padding:2px 10px;border-radius:10px;font-size:.75rem;font-weight:700;}
.badge-approvato{background:#d4efdf;color:#1e8449;border:1.5px solid #27ae60;padding:2px 10px;border-radius:10px;font-size:.75rem;font-weight:700;}
.badge-bloccata{background:#f8d7da;color:#721c24;border:1.5px solid #f5c6cb;padding:2px 10px;border-radius:10px;font-size:.75rem;font-weight:700;}
.notif-badge{background:var(--rosso);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;margin-left:4px;}
.notif-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:10px;border-left:4px solid var(--giallo);}
.notif-card.urgente{border-left-color:var(--rosso);}
.notif-card.ok{border-left-color:#27ae60;}
.bozza-row{background:#fffde7!important;}
.bozza-row:hover td{background:#fff9c4!important;}
.btn-bozza{background:#ffc107;color:#333;border:none;border-radius:6px;padding:6px 12px;font-size:.8rem;font-weight:600;cursor:pointer;}
.btn-bozza:hover{background:#e0a800;}
.ore-warning{background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:8px 12px;font-size:.85rem;color:#856404;margin-bottom:8px;}
.ore-ok{background:#d4efdf;border:1px solid #27ae60;border-radius:6px;padding:8px 12px;font-size:.85rem;color:#1e8449;margin-bottom:8px;}
.op-ore-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:4px;cursor:pointer;}
.op-ore-row:hover{background:var(--verde-pale);}
.op-ore-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;flex-shrink:0;accent-color:var(--verde);}
.op-ore-row .op-nome{flex:1;font-size:.88rem;}
.op-ore-input{width:70px;padding:4px 6px;border:1.5px solid var(--bordo);border-radius:5px;font-size:.85rem;text-align:center;display:none;}
.op-ore-input.visible{display:block;}
</style>

let firebaseDB=null,firebaseRef=null,useFirebase=false;
function initFirebase(){
  try{
    if(typeof firebase!=='undefined' && FIREBASE_CONFIG.apiKey!=='INSERISCI_QUI_LA_TUA_API_KEY'){
      if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      firebaseDB=firebase.database();
      firebaseRef=firebaseDB.ref('somica_vd');
      useFirebase=true;
      firebaseRef.on('value',snapshot=>{
        const data=snapshot.val();
        if(data){
          const def=defaultDB();
          db=data;
          ['utenti','settoriDiserbo','areeDiserbo','lavorazioniDiserbo','registrazioniDiserbo',
           'settoriVerde','areeVerde','lavorazioniVerde','registrazioniVerde','notifiche','approvazioniOre'].forEach(k=>{
            if(!db[k]) db[k]=def[k];
          });
        } else {
          db=defaultDB();
          firebaseRef.set(db);
        }
        try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(e){}
        if(currentUser&&currentRoute) refreshCurrentView();
      });
      showBanner('\u2601\ufe0f Database cloud attivo — dati condivisi tra tutti gli utenti','success');
    } else {
      showBanner('\ud83d\udd12 Modalit\u00e0 locale — configura Firebase per database condiviso','warning');
    }
  }catch(e){
    console.warn('Firebase init failed:',e);
    showBanner('\u26a0\ufe0f Errore Firebase — uso database locale','error');
  }
}
function refreshCurrentView(){
  if(!currentUser) return;
  const c=document.getElementById('main-content');
  if(!c) return;
  if(currentRoute==='archivio-diserbo') renderTabella('diserbo');
  else if(currentRoute==='archivio-verde') renderTabella('verde');
  else if(currentRoute==='statistiche'){c.innerHTML=renderStatistiche();}
  else if(currentRoute==='home'){c.innerHTML=renderHome();}
  else if(currentRoute==='notifiche'){c.innerHTML=renderNotifiche();}
  else if(currentRoute==='mie-registrazioni'){c.innerHTML=renderMieRegistrazioni();}
  setTimeout(()=>aggiornaBadgeNotifiche(),100);
}
function showBanner(msg,type){
  const colors={success:'#d4efdf',warning:'#fef9e7',error:'#fadbd8'};
  const text={success:'#1e8449',warning:'#7d6608',error:'#922b21'};
  let b=document.getElementById('firebase-banner');
  if(!b){b=document.createElement('div');b.id='firebase-banner';b.style.cssText='position:fixed;bottom:12px;right:12px;padding:10px 16px;border-radius:8px;font-size:.82rem;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.2);max-width:320px;';document.body.appendChild(b);}
  b.style.background=colors[type]||colors.warning;
  b.style.color=text[type]||text.warning;
  b.innerHTML=msg;
  if(type==='success') setTimeout(()=>{if(b)b.remove();},4000);
}
function loadDB(){try{const d=localStorage.getItem(DB_KEY);if(d)return JSON.parse(d);}catch(e){}return defaultDB();}
async function saveDB(){
  try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(e){}
  if(useFirebase&&firebaseRef){
    try{await firebaseRef.set(db);}catch(e){console.warn('Firebase save error:',e);}
  }
}

function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value.trim();
  const ut=db.utenti.find(x=>x.username===u&&x.password===p&&x.attivo);
  const err=document.getElementById('login-error');
  if(!ut){err.textContent='Credenziali non valide o utente disabilitato.';err.classList.remove('hidden');return;}
  err.classList.add('hidden');
  currentUser=ut;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  document.getElementById('user-name-hdr').textContent=ut.nome+' '+ut.cognome+' ['+ruoliLabel[ut.ruolo]+']';
  buildNav();routeTo('home');
  if(ut.ruolo==='admin'){
    setTimeout(function(){controlloGiornalieroOre();},3000);
  }
}

  currentUser=null;

function filtroArchivio(modulo){
  const regs=modulo==='diserbo'?db.registrazioniDiserbo:db.registrazioniVerde;
  const dal=document.getElementById('f-dal')?.value;
  const al=document.getElementById('f-al')?.value;
  const sid=document.getElementById('f-settore')?.value;
  const aid=document.getElementById('f-area')?.value;
  const opId=document.getElementById('f-op')?.value;
  const lavId=document.getElementById('f-lav')?.value;
  const stato=document.getElementById('f-stato')?.value;
  const sinvio=document.getElementById('f-sinvio')?.value;
  return (regs||[]).filter(r=>{
    if(!r) return false;
    if(dal&&r.data<dal)return false;
    if(al&&r.data>al)return false;
    if(sid&&r.settoreId!==sid)return false;
    if(aid&&r.areaId!==aid)return false;
    if(opId&&(!r.operatori||!r.operatori.includes(opId)))return false;
    if(lavId&&(!r.lavorazioni||!r.lavorazioni.includes(lavId)))return false;
    if(stato&&r.stato!==stato)return false;
    if(sinvio&&(r.statoInvio||'inviato')!==sinvio)return false;
    return true;
  }).sort((a,b)=>b.data.localeCompare(a.data));
}

function esportaCSV(modulo){
  const rows=filtroArchivio(modulo);
  const isD=modulo==='diserbo';
  const aree=isD?db.areeDiserbo:db.areeVerde;
  const sett=isD?db.settoriDiserbo:db.settoriVerde;
  const lav=isD?db.lavorazioniDiserbo:db.lavorazioniVerde;
  const hdr=isD?['Data','Settore','Area','Superficie mq','Operatori','Lavorazioni','Ore/Op','Ore Totali','Stato','Invio','Note']
    :['Data','Area','Settore','Superficie mq','Operatori','Lavorazioni','Ore/Op','Ore Totali','mq Conteggiati','Stato','Invio','Note'];
  const csv=[hdr.join(';')].concat(rows.map(r=>{
    const a=aree.find(x=>x.id===r.areaId);
    const s=sett.find(x=>x.id===r.settoreId);
    const ops=(r.operatori||[]).map(oid=>{const u=db.utenti.find(x=>x.id===oid);return u?u.nome+' '+u.cognome:oid;}).join(' / ');
    const lavNomi=(r.lavorazioni||[]).map(lid=>{if(lid==='lv17_2')return '2a Verifica irrig.';const l=lav.find(x=>x.id===lid);return l?l.nome:lid;}).join(' / ');
    const row=[r.data,isD?(s?s.nome:''):(s?s.nome:''),a?a.nome:'',a?a.superficie:'',ops,lavNomi,r.ore||'0',(r.oreTotali||0).toFixed(1)];
    if(!isD)row.push(r.superficieMq||0);
    row.push(r.stato,r.statoInvio||'inviato',r.note||'');
    return row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';');
  })).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='somica_'+modulo+'_'+oggi()+'.csv';a.click();
}

// ============ NOTIFICHE ============
function generaNotificheApprovazione(regId){
  if(!db.notifiche) db.notifiche=[];
  db.notifiche=db.notifiche.filter(n=>n.regId!==regId);
  const isD=regId.startsWith('rd');
  const r=(isD?db.registrazioniDiserbo:db.registrazioniVerde).find(x=>x.id===regId);
  if(!r)return;
  db.notifiche.push({id:'notif_'+Date.now(),tipo:'approvazione',regId,modulo:isD?'diserbo':'verde',data:r.data,operatori:r.operatori,creato:new Date().toISOString(),letto:false});
}
function generaNotificheOre(data){
  if(!data) return;
  if(!db.notifiche) db.notifiche=[];
  const operatoriAttivi=db.utenti.filter(function(u){return u.attivo&&u.ruolo==='operatore';});
  operatoriAttivi.forEach(function(op){
    const regs=[...(db.registrazioniDiserbo||[]),...(db.registrazioniVerde||[])]
      .filter(function(r){return r.data===data&&r.operatori&&r.operatori.includes(op.id)&&r.statoInvio!=='bozza';});
    const oreTot=regs.reduce(function(s,r){
      if(r.oreIndividuali&&r.oreIndividuali[op.id]!==undefined) return s+(r.oreIndividuali[op.id]||0);
      return s+(r.ore||0);
    },0);
    // Controlla se esiste già una notifica per questo operatore+data
    const esistente=(db.notifiche||[]).find(function(n){return n.tipo==='ore'&&n.opId===op.id&&n.data===data;});
    if(esistente){
      // Se già approvata non toccare
      if(esistente.stato==='assenza_approvata') return;
      // Altrimenti aggiorna le ore
      esistente.oreTot=oreTot;
      if(oreTot>=8) db.notifiche=db.notifiche.filter(function(n){return !(n.tipo==='ore'&&n.opId===op.id&&n.data===data);});
    } else {
      // Non esiste — crea solo se ore < 8 e giorno lavorativo
      const dow=new Date(data).getDay();
      if((dow>=1&&dow<=5)&&oreTot>0&&oreTot<8){
        db.notifiche.push({
          id:'ore_'+op.id+'_'+data,
          tipo:'ore',opId:op.id,
          opNome:op.nome+' '+op.cognome,
          data,oreTot,
          stato:'da_verificare',
          creato:new Date().toISOString(),
          letto:false
        });
      }
    }
  });
}

  const aD=db.areeDiserbo||[], aV=db.areeVerde||[];
  function byMese(regs){const m={};regs.forEach(r=>{if(r&&r.data){const k=r.data.slice(0,7);m[k]=(m[k]||0)+1;}});return Object.entries(m).sort().slice(-6);}
  function byAreaTop(regs,aree){const m={};regs.forEach(r=>{if(!r||!r.areaId)return;const a=aree.find(x=>x.id===r.areaId);const k=a?a.nome:'N/D';m[k]=(m[k]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,6);}
  function byLav(regs,lavs){const m={};regs.forEach(r=>{if(!r||!r.lavorazioni)return;r.lavorazioni.forEach(lid=>{const l=lavs.find(x=>x.id===lid);const k=l?l.nome.slice(0,28):'N/D';m[k]=(m[k]||0)+1;});});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,6);}
  function oreByMese(regs){const m={};regs.forEach(r=>{if(!r||!r.data)return;const k=r.data.slice(0,7);m[k]=(m[k]||0)+(r.oreTotali||0);});return Object.entries(m).sort().slice(-6);}
  function byStato(regs){const m={completata:0,'da-completare':0,sospesa:0};regs.forEach(r=>{if(r&&r.stato&&m[r.stato]!==undefined)m[r.stato]++;});return m;}
  const totD=d.length,totV=v.length;
  const oreD=d.reduce((s,r)=>s+(r&&r.oreTotali?r.oreTotali:0),0);
  const oreV=v.reduce((s,r)=>s+(r&&r.oreTotali?r.oreTotali:0),0);
  const mqD=d.reduce((s,r)=>s+(r&&r.superficieMq?r.superficieMq:0),0);
  const mqV=v.reduce((s,r)=>s+(r&&r.superficieMq?r.superficieMq:0),0);
  const mD=byMese(d),mV=byMese(v);
  const areeD=byAreaTop(d,aD),areeV=byAreaTop(v,aV);
  const lavD=byLav(d,lD),lavV=byLav(v,lV);
  const oreD6=oreByMese(d),oreV6=oreByMese(v);
  const statoD=byStato(d),statoV=byStato(v);
  function barChart(items,color,unit){
    if(!items.length) return '<p class="text-small" style="padding:8px">Nessun dato</p>';
    const max=Math.max(...items.map(x=>x[1]),1);
    return items.map(([lbl,val])=>{const pct=Math.round((val/max)*100);const short=lbl.length>28?lbl.slice(0,26)+'\u2026':lbl;return '<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:.78rem;color:#444">'+short+'</span><span style="font-size:.78rem;font-weight:700;color:'+color+'">'+val+(unit?' '+unit:'')+'</span></div><div style="height:16px;background:#f0f0f0;border-radius:8px;overflow:hidden"><div style="height:100%;background:'+color+';width:'+pct+'%;border-radius:8px"></div></div></div>';}).join('');
  }
  function donutChart(stato,colorMap){
    const tot=stato.completata+stato['da-completare']+stato.sospesa;
    if(tot===0) return '<p class="text-small" style="padding:8px;text-align:center">Nessun dato</p>';
    const items=[{k:'completata',label:'Completati',color:colorMap[0],val:stato.completata},{k:'da-completare',label:'Da completare',color:colorMap[1],val:stato['da-completare']},{k:'sospesa',label:'Sospesi',color:colorMap[2],val:stato.sospesa}];
    const r=50,cx=60,cy=60,stroke=22,circ=2*Math.PI*r;
    let offset=0;let arcs='';
    items.forEach(it=>{const dash=(it.val/tot)*circ;arcs+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+it.color+'" stroke-width="'+stroke+'" stroke-dasharray="'+dash.toFixed(1)+' '+circ.toFixed(1)+'" stroke-dashoffset="-'+offset.toFixed(1)+'" transform="rotate(-90 '+cx+' '+cy+')" />';offset+=dash;});
    const legend=items.map(it=>'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:.78rem"><div style="width:10px;height:10px;border-radius:50%;background:'+it.color+'"></div>'+it.label+': <strong>'+it.val+'</strong> ('+Math.round((it.val/tot)*100)+'%)</div>').join('');
    return '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center"><svg width="120" height="120" viewBox="0 0 120 120">'+arcs+'<text x="60" y="55" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">'+tot+'</text><text x="60" y="72" text-anchor="middle" font-size="9" fill="#888">interventi</text></svg><div>'+legend+'</div></div>';
  }
  function trendDual(mD,mV){
    const allMesi=[...new Set([...mD.map(x=>x[0]),...mV.map(x=>x[0])])].sort().slice(-6);
    if(!allMesi.length) return '<p class="text-small" style="padding:8px">Nessun dato</p>';
    const mapD=Object.fromEntries(mD),mapV=Object.fromEntries(mV);
    const maxVal=Math.max(...allMesi.map(m=>(mapD[m]||0)+(mapV[m]||0)),1);
    return allMesi.map(m=>{const vd=mapD[m]||0,vv=mapV[m]||0;const pw=d=>Math.round((d/maxVal)*100);const mLabel=m.slice(5)+'/'+m.slice(0,4);return '<div style="margin-bottom:8px"><div style="font-size:.75rem;color:#666;margin-bottom:2px">'+mLabel+'</div><div style="display:flex;gap:3px;height:18px"><div style="background:var(--arancio);width:'+pw(vd)+'%;border-radius:4px 0 0 4px;display:flex;align-items:center;padding-left:4px"><span style="color:#fff;font-size:.7rem;font-weight:700">'+(vd||'')+'</span></div><div style="background:var(--verde);width:'+pw(vv)+'%;border-radius:0 4px 4px 0;display:flex;align-items:center;padding-left:4px"><span style="color:#fff;font-size:.7rem;font-weight:700">'+(vv||'')+'</span></div></div></div>';}).join('');
  }
  const noData=(totD+totV)===0;
  const noDataMsg='<div class="card" style="text-align:center;padding:30px"><div style="font-size:2.5rem;margin-bottom:12px">&#128202;</div><p style="color:var(--grigio-mid)">Le statistiche si popolano automaticamente con le registrazioni.</p></div>';
  return '<div>'
    +'<div class="stats-grid" style="margin-bottom:16px">'
    +'<div class="stat-card"><div class="num">'+(totD+totV)+'</div><div class="lbl">Interventi Totali</div></div>'
    +'<div class="stat-card" style="border-top-color:var(--arancio)"><div class="num" style="color:var(--arancio)">'+totD+'</div><div class="lbl">Diserbo</div></div>'
    +'<div class="stat-card"><div class="num">'+totV+'</div><div class="lbl">Verde</div></div>'
    +'<div class="stat-card" style="border-top-color:var(--blu)"><div class="num" style="color:var(--blu)">'+(oreD+oreV).toFixed(1)+'</div><div class="lbl">Ore Uomo Totali</div></div>'
    +'<div class="stat-card" style="border-top-color:var(--giallo)"><div class="num" style="color:var(--giallo)">'+(mqD+mqV).toLocaleString('it-IT')+'</div><div class="lbl">m&sup2; Manutenuti</div></div>'
    +'<div class="stat-card" style="border-top-color:#8e44ad"><div class="num" style="color:#8e44ad">'+db.utenti.filter(u=>u.attivo&&u.ruolo==="operatore").length+'</div><div class="lbl">Operatori Attivi</div></div>'
    +'</div>'
    +(noData?noDataMsg:
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'
    +'<div class="card"><div class="card-title">&#128200; Trend mensile</div>'
    +'<div style="display:flex;gap:12px;margin-bottom:8px;font-size:.75rem"><span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--arancio);border-radius:2px;display:inline-block"></span>Diserbo</span><span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--verde);border-radius:2px;display:inline-block"></span>Verde</span></div>'
    +trendDual(mD,mV)+'</div>'
    +'<div style="display:grid;grid-template-rows:1fr 1fr;gap:10px">'
    +'<div class="card"><div class="card-title" style="font-size:.85rem">&#9986;&#65039; Stato Diserbo</div>'+donutChart(statoD,['#27ae60','#f39c12','#e74c3c'])+'</div>'
    +'<div class="card"><div class="card-title" style="font-size:.85rem">&#127807; Stato Verde</div>'+donutChart(statoV,['#27ae60','#f39c12','#e74c3c'])+'</div>'
    +'</div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'
    +'<div class="card"><div class="card-title" style="color:var(--arancio)">&#9986;&#65039; Aree diserbo top</div>'+barChart(areeD,'var(--arancio)','interv.')+'</div>'
    +'<div class="card"><div class="card-title">&#127807; Aree verde top</div>'+barChart(areeV,'var(--verde)','interv.')+'</div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'
    +'<div class="card"><div class="card-title" style="color:var(--arancio)">&#9986;&#65039; Lavorazioni diserbo top</div>'+barChart(lavD,'#e67e22','volte')+'</div>'
    +'<div class="card"><div class="card-title">&#127807; Lavorazioni verde top</div>'+barChart(lavV,'#2ecc71','volte')+'</div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'
    +'<div class="card"><div class="card-title" style="color:var(--arancio)">&#9986;&#65039; Ore diserbo/mese</div>'+barChart(oreD6.map(([m,v])=>[m.slice(5)+'/'+m.slice(2,4),parseFloat(v.toFixed(1))]),'var(--arancio)','h')
    +'<div class="text-small mt-8">Totale: <strong>'+oreD.toFixed(1)+'h</strong> | m&sup2;: <strong>'+mqD.toLocaleString('it-IT')+'</strong></div></div>'
    +'<div class="card"><div class="card-title">&#127807; Ore verde/mese</div>'+barChart(oreV6.map(([m,v])=>[m.slice(5)+'/'+m.slice(2,4),parseFloat(v.toFixed(1))]),'var(--verde)','h')
    +'<div class="text-small mt-8">Totale: <strong>'+oreV.toFixed(1)+'h</strong> | m&sup2;: <strong>'+mqV.toLocaleString('it-IT')+'</strong></div></div>'
    +'</div>')
    +'</div>';
}

function addUtente(){
  const nome=document.getElementById('nu-nome').value.trim();
  const cogn=document.getElementById('nu-cogn').value.trim();
  const user=document.getElementById('nu-user').value.trim();
  const pass=document.getElementById('nu-pass').value.trim();
  const ruolo=document.getElementById('nu-ruolo').value;
  if(!nome||!user||!pass){alert('Compilare nome, username e password.');return;}
  if(db.utenti.find(u=>u.username===user)){alert('Username gi\u00e0 esistente.');return;}

function aggiornaBadgeNotifiche(){
  if(!currentUser||currentUser.ruolo!=='admin') return;
  const pendenti=(db.notifiche||[]).filter(function(n){
    // Escludi assenze già approvate
    if(n.tipo==='ore'&&n.stato==='assenza_approvata') return false;
    // Escludi registrazioni già approvate
    if(n.tipo==='approvazione'){
      const arr=n.modulo==='diserbo'?db.registrazioniDiserbo:db.registrazioniVerde;
      const r=arr?arr.find(function(x){return x.id===n.regId;}):null;
      if(r&&r.statoInvio==='approvato') return false;
    }
    return true;
  }).length;
  const tab=document.querySelector('.nav-tab[data-route="notifiche"]');
  if(!tab) return;
  const existing=tab.querySelector('.notif-badge');
  if(existing) existing.remove();
  if(pendenti>0){
    const badge=document.createElement('span');
    badge.className='notif-badge';
    badge.textContent=pendenti>9?'9+':String(pendenti);
    tab.appendChild(badge);
  }
}

function controlloGiornalieroOre(){
  if(!currentUser||currentUser.ruolo!=='admin') return;
  if(!db.notifiche) db.notifiche=[];

  // Se primo avvio: imposta punto zero a ieri e non fare niente
  if(!db._ultimoControlloOre){
    const ieri=new Date();
    ieri.setDate(ieri.getDate()-1);
    db._ultimoControlloOre=ieri.toISOString().slice(0,10);
    saveDB();
    return;
  }

  // Trova giorni da verificare: dal giorno dopo _ultimoControlloOre fino a ieri
  const ieri=new Date();
  ieri.setDate(ieri.getDate()-1);
  const ieriStr=ieri.toISOString().slice(0,10);

  // Se già verificato ieri, non fare niente
  if(db._ultimoControlloOre>=ieriStr) return;

  const giorniDaVerificare=[];
  let cursore=new Date(ieri);
  for(let i=0;i<30;i++){
    const dataStr=cursore.toISOString().slice(0,10);
    if(dataStr<=db._ultimoControlloOre) break;
    const dow=cursore.getDay();
    if(dow>=1&&dow<=5) giorniDaVerificare.push(dataStr);
    cursore.setDate(cursore.getDate()-1);
  }

  if(!giorniDaVerificare.length){
    db._ultimoControlloOre=ieriStr;
    saveDB();
    return;
  }

  const operatoriAttivi=db.utenti.filter(function(u){return u.attivo&&u.ruolo==='operatore';});

  giorniDaVerificare.forEach(function(data){

    // --- NOTIFICHE ORE < 8 ---
    operatoriAttivi.forEach(function(op){
      const regs=[...(db.registrazioniDiserbo||[]),...(db.registrazioniVerde||[])]
        .filter(function(r){
          return r.data===data&&r.operatori&&r.operatori.includes(op.id)&&r.statoInvio!=='bozza';
        });
      const oreTot=regs.reduce(function(s,r){
        if(r.oreIndividuali&&r.oreIndividuali[op.id]!==undefined) return s+(r.oreIndividuali[op.id]||0);
        return s+(r.ore||0);
      },0);

      // Controlla se già esiste notifica per questo operatore+data
      const esistente=(db.notifiche||[]).find(function(n){
        return n.tipo==='ore'&&n.opId===op.id&&n.data===data;
      });

      if(!esistente){
        // Crea notifica se ore < 8 (incluso 0 = assente)
        if(oreTot<8){
          db.notifiche.push({
            id:'ore_'+op.id+'_'+data,
            tipo:'ore',opId:op.id,
            opNome:op.nome+' '+op.cognome,
            data,oreTot,
            stato:'da_verificare',
            creato:new Date().toISOString(),
            letto:false
          });
        }
      } else if(esistente.stato!=='assenza_approvata'){
        // Aggiorna ore se non ancora approvata
        esistente.oreTot=oreTot;
        if(oreTot>=8){
          // Ore ok ora, rimuovi notifica
          db.notifiche=db.notifiche.filter(function(n){
            return !(n.tipo==='ore'&&n.opId===op.id&&n.data===data);
          });
        }
      }
    });

    // --- NOTIFICHE APPROVAZIONE registrazioni inviate ---
    [...(db.registrazioniDiserbo||[]).map(function(r){return Object.assign({},r,{_mod:'diserbo'});}),
     ...(db.registrazioniVerde||[]).map(function(r){return Object.assign({},r,{_mod:'verde'});})]
      .filter(function(r){return r.data===data&&r.statoInvio==='inviato';})
      .forEach(function(r){
        const giaNotificata=(db.notifiche||[]).some(function(n){return n.tipo==='approvazione'&&n.regId===r.id;});
        if(!giaNotificata){
          db.notifiche.push({
            id:'notif_'+r.id,
            tipo:'approvazione',
            regId:r.id,
            modulo:r._mod,
            data:r.data,
            operatori:r.operatori,
            creato:new Date().toISOString(),
            letto:false
          });
        }
      });
  });

  db._ultimoControlloOre=ieriStr;
  saveDB();
  aggiornaBadgeNotifiche();
  console.log('Controllo notturno: verificati '+giorniDaVerificare.length+' giorni.');
}


// Avvia Firebase appena la pagina è pronta
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', initFirebase);
} else {
  initFirebase();
}
</script>
