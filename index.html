<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SO.MI.CA. S.p.A. — Verde &amp; Diserbo</title>
<style>
:root{--verde:#1a5c2a;--verde-light:#2d8a44;--verde-pale:#e8f5ec;--arancio:#d4500a;--arancio-light:#f06820;--grigio:#2c2c2c;--grigio-mid:#5a5a5a;--grigio-light:#f2f2f2;--bianco:#fff;--bordo:#d0d0d0;--rosso:#c0392b;--blu:#1a4a8a;--giallo:#f39c12;--shadow:0 2px 8px rgba(0,0,0,0.12);--radius:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f0;color:var(--grigio);min-height:100vh;}
#app-header{background:var(--verde);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.25);position:sticky;top:0;z-index:100;}
#app-header .logo-area{display:flex;align-items:center;gap:10px;}
#app-header img{height:38px;background:#fff;border-radius:4px;padding:2px 6px;}
#app-header h1{font-size:1.05rem;font-weight:700;line-height:1.2;}
#app-header h1 small{font-size:0.72rem;font-weight:400;opacity:.85;display:block;}
#header-right{display:flex;align-items:center;gap:8px;}
#user-badge{font-size:.75rem;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;cursor:pointer;}
#logout-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:.8rem;}
#logout-btn:hover{background:rgba(255,255,255,.35);}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a5c2a 0%,#2d8a44 50%,#1a5c2a 100%);}
.login-card{background:#fff;border-radius:16px;padding:36px 32px;width:340px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.25);}
.login-card .logo-wrap{text-align:center;margin-bottom:20px;}
.login-card img{height:50px;margin-bottom:10px;}
.login-card h2{text-align:center;color:var(--verde);font-size:1.1rem;margin-bottom:4px;}
.login-card p{text-align:center;color:var(--grigio-mid);font-size:.8rem;margin-bottom:24px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--grigio-mid);margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bordo);border-radius:var(--radius);font-size:.95rem;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--verde);}
.btn{display:inline-block;padding:10px 20px;border:none;border-radius:var(--radius);cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;}
.btn-verde{background:var(--verde);color:#fff;}.btn-verde:hover{background:var(--verde-light);}
.btn-arancio{background:var(--arancio);color:#fff;}.btn-arancio:hover{background:var(--arancio-light);}
.btn-grigio{background:#e0e0e0;color:var(--grigio);}.btn-grigio:hover{background:#ccc;}
.btn-rosso{background:var(--rosso);color:#fff;}.btn-rosso:hover{background:#a93226;}
.btn-blu{background:var(--blu);color:#fff;}.btn-blu:hover{background:#1a5cb8;}
.btn-full{width:100%;}.btn-sm{padding:6px 12px;font-size:.8rem;}.btn-lg{padding:14px 20px;font-size:1rem;}
#main-nav{background:#fff;border-bottom:2px solid var(--verde-pale);display:flex;overflow-x:auto;}
.nav-tab{padding:12px 20px;font-size:.88rem;font-weight:600;color:var(--grigio-mid);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s;}
.nav-tab.active{color:var(--verde);border-bottom-color:var(--verde);}
.nav-tab:hover{background:var(--verde-pale);}
#main-content{padding:16px;max-width:960px;margin:0 auto;}
.module-selector{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.module-card{background:#fff;border:2px solid var(--bordo);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;}
.module-card:hover,.module-card.active{border-color:var(--verde);background:var(--verde-pale);}
.module-card .icon{font-size:2.2rem;margin-bottom:8px;}
.module-card h3{font-size:.95rem;color:var(--verde);}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
.card-title{font-size:1rem;font-weight:700;color:var(--verde);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--verde-pale);}
.reg-form .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.reg-form .form-row{grid-template-columns:1fr;}.module-selector{grid-template-columns:1fr;}}
.checklist{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;border:1px solid var(--bordo);border-radius:var(--radius);padding:8px;}
.checklist label{display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:.88rem;padding:4px 6px;border-radius:4px;}
.checklist label:hover{background:var(--verde-pale);}
.checklist input[type=checkbox]{width:18px;height:18px;margin-top:1px;cursor:pointer;flex-shrink:0;accent-color:var(--verde);}
.sub-field{margin:6px 0 6px 26px;padding:8px;background:#f9f9f9;border-radius:6px;border-left:3px solid var(--verde-light);}
.sub-field label{font-size:.82rem;font-weight:600;color:var(--grigio-mid);display:block;margin-bottom:4px;}
.sub-field textarea{width:100%;padding:7px;border:1px solid var(--bordo);border-radius:5px;font-size:.85rem;resize:vertical;}
.radio-group{display:flex;gap:12px;flex-wrap:wrap;}
.radio-group label{display:flex;align-items:center;gap:5px;font-size:.85rem;cursor:pointer;font-weight:400;}
.stato-flags{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px;}
.stato-flag{display:flex;align-items:center;gap:6px;padding:8px 14px;border:2px solid var(--bordo);border-radius:20px;cursor:pointer;font-size:.88rem;}
.stato-flag input{accent-color:var(--verde);width:16px;height:16px;}
.data-table{width:100%;border-collapse:collapse;font-size:.83rem;}
.data-table th{background:var(--verde);color:#fff;padding:8px 10px;text-align:left;white-space:nowrap;}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--verde-pale);vertical-align:top;}
.data-table tr:hover td{background:#f5faf6;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600;}
.badge-verde{background:#d4efdf;color:#1e8449;}.badge-giallo{background:#fdebd0;color:#ca6f1e;}.badge-rosso{background:#fadbd8;color:#922b21;}
.filter-bar{background:#fff;border-radius:var(--radius);padding:12px;margin-bottom:14px;box-shadow:var(--shadow);}
.filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;align-items:end;}
.filter-grid select,.filter-grid input{width:100%;padding:7px 10px;border:1.5px solid var(--bordo);border-radius:6px;font-size:.83rem;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
.stat-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--verde);}
.stat-card .num{font-size:1.9rem;font-weight:800;color:var(--verde);}
.stat-card .lbl{font-size:.75rem;color:var(--grigio-mid);margin-top:2px;}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:20px;}
.admin-section-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);}
.admin-section-card h4{font-size:.9rem;font-weight:700;color:var(--verde);margin-bottom:10px;border-bottom:1px solid var(--verde-pale);padding-bottom:6px;}
.admin-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:.82rem;}
.admin-item:last-child{border-bottom:none;}
.admin-item .item-name{flex:1;}
.admin-item .item-actions{display:flex;gap:4px;}
.add-form{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.add-form input,.add-form select{flex:1;min-width:80px;padding:7px 10px;border:1.5px solid var(--bordo);border-radius:6px;font-size:.83rem;}
.alert{padding:10px 14px;border-radius:var(--radius);margin-bottom:12px;font-size:.88rem;}
.alert-success{background:#d4efdf;color:#1e8449;border-left:4px solid #27ae60;}
.alert-error{background:#fadbd8;color:#922b21;border-left:4px solid var(--rosso);}
.hidden{display:none!important;}
.text-center{text-align:center;}.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}
.flex-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.text-small{font-size:.8rem;color:var(--grigio-mid);}
.op-big-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
@media(max-width:480px){.op-big-grid{grid-template-columns:1fr;}}
.op-big-btn{background:#fff;border:2.5px solid var(--verde);border-radius:12px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.op-big-btn:hover{background:var(--verde);}.op-big-btn:hover h3{color:#fff;}
.op-big-btn .icon{font-size:2rem;margin-bottom:6px;display:block;}
.op-big-btn h3{font-size:.92rem;font-weight:700;color:var(--verde);}
@media print{
  #app-header,#main-nav,.no-print{display:none!important;}
  body{background:#fff;}
  .print-header{display:block!important;}
  .card{box-shadow:none;border:1px solid #ddd;}
}
.print-header{display:none;text-align:center;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--verde);}
.print-header img{height:55px;margin-bottom:6px;}
.print-header .intestazione{font-size:.68rem;color:#555;line-height:1.6;margin-top:6px;}
</style>

let firebaseDB = null;
let firebaseRef = null;
let useFirebase = false;

function initFirebase(){
  try {
    if(typeof firebase !== 'undefined' && FIREBASE_CONFIG.apiKey !== 'INSERISCI_QUI_LA_TUA_API_KEY'){
      firebase.initializeApp(FIREBASE_CONFIG);
      firebaseDB = firebase.database();
      firebaseRef = firebaseDB.ref('somica_vd');
      useFirebase = true;
      // Listen for real-time updates
      firebaseRef.on('value', snapshot => {
        const data = snapshot.val();
        if(data){
          // Merge: preserva struttura default se mancano chiavi
          const def = defaultDB();
          db = data;
          // Assicura che le array chiave esistano sempre
          ['utenti','settoriDiserbo','areeDiserbo','lavorazioniDiserbo','registrazioniDiserbo',
           'settoriVerde','areeVerde','lavorazioniVerde','registrazioniVerde'].forEach(k=>{
            if(!db[k]) db[k] = def[k];
          });
        } else {
          // Firebase vuoto: carica dati di default e li salva sul cloud
          db = defaultDB();
          firebaseRef.set(db);
        }
        try{localStorage.setItem(DB_KEY, JSON.stringify(db));}catch(e){}
        if(currentUser && currentRoute) refreshCurrentView();
      });
      showBanner('&#9925; Database cloud attivo — dati condivisi tra tutti gli utenti', 'success');
      console.log('Firebase connected');
    } else {
      showBanner('&#128274; Modalità locale — configura Firebase per database condiviso', 'warning');
    }
  } catch(e) {
    console.warn('Firebase init failed:', e);
    showBanner('&#9888;&#65039; Errore Firebase — uso database locale', 'error');
  }
}

function refreshCurrentView(){
  if(!currentUser) return;
  const c = document.getElementById('main-content');
  if(!c) return;
  // Only refresh archivio and statistiche (forms should not auto-refresh)
  if(currentRoute === 'archivio-diserbo') renderTabella('diserbo');
  else if(currentRoute === 'archivio-verde') renderTabella('verde');
  else if(currentRoute === 'statistiche'){ c.innerHTML = renderStatistiche(); }
  else if(currentRoute === 'home'){ c.innerHTML = renderHome(); }
}

function showBanner(msg, type){
  const colors = {success:'#d4efdf',warning:'#fef9e7',error:'#fadbd8'};
  const text = {success:'#1e8449',warning:'#7d6608',error:'#922b21'};
  let b = document.getElementById('firebase-banner');
  if(!b){ b = document.createElement('div'); b.id='firebase-banner'; b.style.cssText='position:fixed;bottom:12px;right:12px;padding:10px 16px;border-radius:8px;font-size:.82rem;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.2);max-width:300px;'; document.body.appendChild(b); }
  b.style.background = colors[type]||colors.warning;
  b.style.color = text[type]||text.warning;
  b.innerHTML = msg;
  if(type==='success') setTimeout(()=>{if(b)b.remove();}, 4000);
}

function loadDB(){
  try{const d=localStorage.getItem(DB_KEY);if(d)return JSON.parse(d);}catch(e){}
  return defaultDB();
}

async function saveDB(){
  // Always save locally first
  try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(e){}
  // If Firebase is configured, also save to cloud
  if(useFirebase && firebaseRef){
    try{
      await firebaseRef.set(db);
    } catch(e){
      console.warn('Firebase save error:', e);
      showBanner('&#9888;&#65039; Errore salvataggio cloud — salvato solo in locale', 'error');
    }
  }
}

function aggiornaAreaDiserbo(preAid){
  const sid=document.getElementById('d-settore').value;

  const aree=db.areeDiserbo.filter(a=>a.settoreId===sid&&a.attivo);

    :'<option value="">Nessuna area disponibile</option>';

function salvaDiserbo(editId){
  const data=document.getElementById('d-data').value;
  const sid=document.getElementById('d-settore').value;
  const aid=document.getElementById('d-area').value;
  const operatori=[...document.querySelectorAll('#d-operatori input:checked')].map(i=>i.value);
  const lavorazioni=[...document.querySelectorAll('#d-lavorazioni input:checked')].map(i=>i.value);
  const ore=parseFloat(document.getElementById('d-ore').value)||0;
  const stato=document.querySelector('input[name="d-stato-r"]:checked');
  const note=document.getElementById('d-note').value.trim();
  const msg=document.getElementById('d-msg');
  if(!data){msg.innerHTML='<div class="alert alert-error">Inserire la data.</div>';return;}
  if(!sid||!aid){msg.innerHTML='<div class="alert alert-error">Selezionare settore e area.</div>';return;}
  if(!operatori.length){msg.innerHTML='<div class="alert alert-error">Selezionare almeno un operatore.</div>';return;}
  if(!lavorazioni.length){msg.innerHTML='<div class="alert alert-error">Selezionare almeno una lavorazione.</div>';return;}
  if(!stato){msg.innerHTML='<div class="alert alert-error">Indicare lo stato della lavorazione.</div>';return;}
  const area=db.areeDiserbo.find(a=>a.id===aid);
  const rec={data,settoreId:sid,areaId:aid,operatori,lavorazioni,ore,oreTotali:ore*operatori.length,stato:stato.value,note,superficieMq:area?area.superficie:0};
  if(editId&&editId!=='null'){
    const idx=db.registrazioniDiserbo.findIndex(r=>r.id===editId);
    if(idx>=0)db.registrazioniDiserbo[idx]={...db.registrazioniDiserbo[idx],...rec,modificatoDa:currentUser.id,modificatoIl:new Date().toISOString()};
  }else{
    db.registrazioniDiserbo.push({id:'rd'+Date.now(),creato:new Date().toISOString(),creatoDa:currentUser.id,...rec});
  }
  saveDB();
  msg.innerHTML='<div class="alert alert-success">&#9989; Registrazione salvata con successo!</div>';
  setTimeout(()=>routeTo(currentUser.ruolo==='operatore'?'home':'archivio-diserbo'),1300);
}

function salvaVerde(editId){
  const data=document.getElementById('v-data').value;
  const aid=document.getElementById('v-area').value;
  const operatori=[...document.querySelectorAll('#v-operatori input:checked')].map(i=>i.value);
  const lavorazioni=[...document.querySelectorAll('#v-lavorazioni input:checked')].map(i=>i.value);
  const ore=parseFloat(document.getElementById('v-ore').value)||0;
  const stato=document.querySelector('input[name="v-stato-r"]:checked');
  const note=document.getElementById('v-note').value.trim();
  const msg=document.getElementById('v-msg');
  if(!data){msg.innerHTML='<div class="alert alert-error">Inserire la data.</div>';return;}
  if(!aid){msg.innerHTML='<div class="alert alert-error">Selezionare l&#39;area di intervento.</div>';return;}
  if(!operatori.length){msg.innerHTML='<div class="alert alert-error">Selezionare almeno un operatore.</div>';return;}
  if(!lavorazioni.length){msg.innerHTML='<div class="alert alert-error">Selezionare almeno una lavorazione.</div>';return;}
  if(!stato){msg.innerHTML='<div class="alert alert-error">Indicare lo stato della lavorazione.</div>';return;}
  if(lavorazioni.includes('lv16')){const n=document.getElementById('note-lv16');if(!n||!n.value.trim()){msg.innerHTML='<div class="alert alert-error">Inserire note per irrigazioni extra canone.</div>';return;}}
  if(lavorazioni.includes('lv19')){const n=document.getElementById('note-lv19');if(!n||!n.value.trim()){msg.innerHTML='<div class="alert alert-error">Inserire note per manutenzione atto vandalico.</div>';return;}}
  if(lavorazioni.includes('lv20')){const n=document.getElementById('note-lv20');if(!n||!n.value.trim()){msg.innerHTML='<div class="alert alert-error">Inserire note per intervento extra canone.</div>';return;}}
  const noteExtra={};
  if(lavorazioni.includes('lv17')){const r=document.querySelector('input[name="v1-esito"]:checked');noteExtra.verifica1=r?r.value:'';}
  if(lavorazioni.includes('lv17_2')){const r=document.querySelector('input[name="v2-esito"]:checked');noteExtra.verifica2=r?r.value:'';}
  const n16=document.getElementById('note-lv16');if(n16)noteExtra.noteLv16=n16.value;
  const n19=document.getElementById('note-lv19');if(n19)noteExtra.noteLv19=n19.value;
  const n20=document.getElementById('note-lv20');if(n20)noteExtra.noteLv20=n20.value;
  const nonSoloNoMq=lavorazioni.some(l=>!LAVORAZIONI_NO_MQ_VERDE.includes(l));
  const area=db.areeVerde.find(a=>a.id===aid);
  const superficieMq=nonSoloNoMq?(area?area.superficie:0):0;
  const rec={data,areaId:aid,operatori,lavorazioni,noteExtra,ore,oreTotali:ore*operatori.length,stato:stato.value,note,superficieMq};
  if(editId&&editId!=='null'){
    const idx=db.registrazioniVerde.findIndex(r=>r.id===editId);
    if(idx>=0)db.registrazioniVerde[idx]={...db.registrazioniVerde[idx],...rec,modificatoDa:currentUser.id,modificatoIl:new Date().toISOString()};
  }else{
    db.registrazioniVerde.push({id:'rv'+Date.now(),creato:new Date().toISOString(),creatoDa:currentUser.id,...rec});
  }
  saveDB();
  msg.innerHTML='<div class="alert alert-success">&#9989; Registrazione salvata con successo!</div>';
  setTimeout(()=>routeTo(currentUser.ruolo==='operatore'?'home':'archivio-verde'),1300);
}

function filtroArchivio(modulo){
  const regs=modulo==='diserbo'?db.registrazioniDiserbo:db.registrazioniVerde;
  const dal=document.getElementById('f-dal')?.value;
  const al=document.getElementById('f-al')?.value;
  const sid=document.getElementById('f-settore')?.value;
  const aid=document.getElementById('f-area')?.value;
  const opId=document.getElementById('f-op')?.value;
  const stato=document.getElementById('f-stato')?.value;
  const lavId=document.getElementById('f-lav')?.value;
  return regs.filter(r=>{
    if(dal&&r.data<dal)return false;
    if(al&&r.data>al)return false;
    if(sid&&r.settoreId!==sid)return false;
    if(aid&&r.areaId!==aid)return false;
    if(opId&&!r.operatori.includes(opId))return false;
    if(stato&&r.stato!==stato)return false;
    if(lavId&&!r.lavorazioni.includes(lavId))return false;
    return true;
  }).sort((a,b)=>b.data.localeCompare(a.data));
}

function esportaCSV(modulo){
  const rows=filtroArchivio(modulo);
  const isD=modulo==='diserbo';
  const aree=isD?db.areeDiserbo:db.areeVerde;
  const sett=isD?db.settoriDiserbo:db.settoriVerde;
  const lav=isD?db.lavorazioniDiserbo:db.lavorazioniVerde;
  const hdr=isD?['Data','Settore','Area','Superficie mq','Operatori','Lavorazioni','Ore/Op','Ore Totali','Stato','Note']
    :['Data','Area','Settore','Superficie mq','Operatori','Lavorazioni','Ore/Op','Ore Totali','mq Conteggiati','Stato','Note'];
  const csv=[hdr.join(';')].concat(rows.map(r=>{
    const a=aree.find(x=>x.id===r.areaId);
    const s=sett.find(x=>x.id===r.settoreId);
    const ops=r.operatori.map(oid=>{const u=db.utenti.find(x=>x.id===oid);return u?u.nome+' '+u.cognome:oid;}).join(' / ');
    const lavNomi=r.lavorazioni.map(lid=>{if(lid==='lv17_2')return '2a Verifica irrigazione';const l=lav.find(x=>x.id===lid);return l?l.nome:lid;}).join(' / ');
    const row=[r.data,isD?(s?s.nome:''):(s?s.nome:''),a?a.nome:'',a?a.superficie:'',ops,lavNomi,r.ore||'0',(r.oreTotali||0).toFixed(1)];
    if(!isD)row.push(r.superficieMq||0);
    row.push(r.stato,r.note||'');
    return row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';');
  })).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='somica_'+modulo+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ============ STATISTICHE ============
function renderStatistiche(){
  const d=db.registrazioniDiserbo||[], v=db.registrazioniVerde||[];
  const lD=db.lavorazioniDiserbo||[], lV=db.lavorazioniVerde||[];
  const aD=db.areeDiserbo||[], aV=db.areeVerde||[];

  // ---- Helper: mesi ultimi 6 ----
  function byMese(regs){
    const m={};
    regs.forEach(r=>{if(r&&r.data){const k=r.data.slice(0,7);m[k]=(m[k]||0)+1;}});
    return Object.entries(m).sort().slice(-6);
  }
  // ---- Helper: per area (top 5) ----
  function byAreaTop(regs,aree){
    const m={};
    regs.forEach(r=>{if(!r||!r.areaId)return;const a=aree.find(x=>x.id===r.areaId);const k=a?a.nome:'N/D';m[k]=(m[k]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,6);
  }
  // ---- Helper: per lavorazione (top 6) ----
  function byLav(regs,lavs){
    const m={};
    regs.forEach(r=>{if(!r||!r.lavorazioni)return;r.lavorazioni.forEach(lid=>{const l=lavs.find(x=>x.id===lid);const k=l?l.nome.slice(0,30):'N/D';m[k]=(m[k]||0)+1;});});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,6);
  }
  // ---- Helper: per mese ore ----
  function oreByMese(regs){
    const m={};
    regs.forEach(r=>{if(!r||!r.data)return;const k=r.data.slice(0,7);m[k]=(m[k]||0)+(r.oreTotali||0);});
    return Object.entries(m).sort().slice(-6);
  }
  // ---- Helper: stato distribuzione ----
  function byStato(regs){
    const m={completata:0,'da-completare':0,sospesa:0};
    regs.forEach(r=>{if(r&&r.stato&&m[r.stato]!==undefined)m[r.stato]++;});
    return m;
  }

  // Totali
  const totD=d.length, totV=v.length;
  const oreD=d.reduce((s,r)=>s+(r&&r.oreTotali?r.oreTotali:0),0);
  const oreV=v.reduce((s,r)=>s+(r&&r.oreTotali?r.oreTotali:0),0);
  const mqD=d.reduce((s,r)=>s+(r&&r.superficieMq?r.superficieMq:0),0);
  const mqV=v.reduce((s,r)=>s+(r&&r.superficieMq?r.superficieMq:0),0);

  // Dati grafici
  const mesiD=byMese(d), mesiV=byMese(v);
  const areeD=byAreaTop(d,aD), areeV=byAreaTop(v,aV);
  const lavD=byLav(d,lD), lavV=byLav(v,lV);
  const oreD6=oreByMese(d), oreV6=oreByMese(v);
  const statoD=byStato(d), statoV=byStato(v);

  // ---- SVG Bar chart orizzontale ----
  function barChart(items, color, unit){
    if(!items.length) return '<p class="text-small" style="padding:8px">Nessun dato disponibile</p>';
    const max=Math.max(...items.map(x=>x[1]),1);
    return items.map(([lbl,val])=>{
      const pct=Math.round((val/max)*100);
      const short=lbl.length>28?lbl.slice(0,26)+'…':lbl;
      return '<div style="margin-bottom:7px">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:2px">'
        +'<span style="font-size:.78rem;color:#444">'+short+'</span>'
        +'<span style="font-size:.78rem;font-weight:700;color:'+color+'">'+val+(unit?' '+unit:'')+'</span>'
        +'</div>'
        +'<div style="height:16px;background:#f0f0f0;border-radius:8px;overflow:hidden">'
        +'<div style="height:100%;background:'+color+';width:'+pct+'%;border-radius:8px;transition:width .5s"></div>'
        +'</div></div>';
    }).join('');
  }

  // ---- Donut SVG per stati ----
  function donutChart(stato, colorMap){
    const tot=stato.completata+stato['da-completare']+stato.sospesa;
    if(tot===0) return '<p class="text-small" style="padding:8px;text-align:center">Nessun dato</p>';
    const pct=k=>Math.round((stato[k]/tot)*100);
    const items=[
      {k:'completata',label:'Completati',color:colorMap[0],val:stato.completata},
      {k:'da-completare',label:'Da completare',color:colorMap[1],val:stato['da-completare']},
      {k:'sospesa',label:'Sospesi',color:colorMap[2],val:stato.sospesa}
    ];
    // Simple donut with CSS
    const r=50,cx=60,cy=60,stroke=22;
    const circ=2*Math.PI*r;
    let offset=0;
    let arcs='';
    items.forEach(it=>{
      const dash=(it.val/tot)*circ;
      arcs+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+it.color+'" stroke-width="'+stroke+'" stroke-dasharray="'+dash.toFixed(1)+' '+circ.toFixed(1)+'" stroke-dashoffset="-'+offset.toFixed(1)+'" transform="rotate(-90 '+cx+' '+cy+')" />';
      offset+=dash;
    });
    const legend=items.map(it=>'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:.78rem"><div style="width:10px;height:10px;border-radius:50%;background:'+it.color+'"></div>'+it.label+': <strong>'+it.val+'</strong> ('+pct(it.k)+'%)</div>').join('');
    return '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center">'
      +'<svg width="120" height="120" viewBox="0 0 120 120">'+arcs
      +'<text x="60" y="55" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">'+tot+'</text>'
      +'<text x="60" y="72" text-anchor="middle" font-size="9" fill="#888">interventi</text>'
      +'</svg>'
      +'<div>'+legend+'</div></div>';
  }

  // ---- Trend mensile dual bar ----
  function trendDual(mD,mV){
    const allMesi=[...new Set([...mD.map(x=>x[0]),...mV.map(x=>x[0])])].sort().slice(-6);
    if(!allMesi.length) return '<p class="text-small" style="padding:8px">Nessun dato</p>';
    const mapD=Object.fromEntries(mD), mapV=Object.fromEntries(mV);
    const maxVal=Math.max(...allMesi.map(m=>(mapD[m]||0)+(mapV[m]||0)),1);
    return allMesi.map(m=>{
      const vd=mapD[m]||0, vv=mapV[m]||0;
      const pw=d=>Math.round((d/maxVal)*100);
      const mLabel=m.slice(5)+'/'+m.slice(0,4);
      return '<div style="margin-bottom:8px">'
        +'<div style="font-size:.75rem;color:#666;margin-bottom:2px">'+mLabel+'</div>'
        +'<div style="display:flex;gap:3px;height:18px">'
        +'<div style="background:var(--arancio);width:'+pw(vd)+'%;border-radius:4px 0 0 4px;display:flex;align-items:center;padding-left:4px"><span style="color:#fff;font-size:.7rem;font-weight:700">'+( vd||'')+'</span></div>'
        +'<div style="background:var(--verde);width:'+pw(vv)+'%;border-radius:0 4px 4px 0;display:flex;align-items:center;padding-left:4px"><span style="color:#fff;font-size:.7rem;font-weight:700">'+( vv||'')+'</span></div>'
        +'</div></div>';
    }).join('');
  }

  const noData = (totD+totV)===0;
  const noDataMsg = '<div class="card" style="text-align:center;padding:30px"><div style="font-size:2.5rem;margin-bottom:12px">📊</div><p style="color:var(--grigio-mid)">Le statistiche si popolano automaticamente<br>man mano che vengono inserite le registrazioni.</p></div>';

  return '<div>'
    // KPI TOP
    +'<div class="stats-grid" style="margin-bottom:16px">'
    +'<div class="stat-card"><div class="num">'+(totD+totV)+'</div><div class="lbl">N° Interventi Totali</div></div>'
    +'<div class="stat-card" style="border-top-color:var(--arancio)"><div class="num" style="color:var(--arancio)">'+totD+'</div><div class="lbl">Interventi Diserbo</div></div>'
    +'<div class="stat-card"><div class="num">'+totV+'</div><div class="lbl">Interventi Verde</div></div>'
    +'<div class="stat-card" style="border-top-color:var(--blu)"><div class="num" style="color:var(--blu)">'+(oreD+oreV).toFixed(1)+'</div><div class="lbl">Ore Uomo Totali</div></div>'
    +'<div class="stat-card" style="border-top-color:var(--giallo)"><div class="num" style="color:var(--giallo)">'+(mqD+mqV).toLocaleString('it-IT')+'</div><div class="lbl">m² Manutenuti</div></div>'
    +'<div class="stat-card" style="border-top-color:#8e44ad"><div class="num" style="color:#8e44ad">'+db.utenti.filter(u=>u.attivo&&u.ruolo==="operatore").length+'</div><div class="lbl">Operatori Attivi</div></div>'
    +'</div>'

    +(noData ? noDataMsg :

    // RIGA 1: Trend mensile + Stato interventi
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'
    +'<div class="card"><div class="card-title">📈 Trend mensile interventi</div>'
    +'<div style="display:flex;gap:12px;margin-bottom:8px;font-size:.75rem">'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--arancio);border-radius:2px;display:inline-block"></span>Diserbo</span>'
    +'<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--verde);border-radius:2px;display:inline-block"></span>Verde</span>'
    +'</div>'
    +trendDual(mesiD,mesiV)
    +'</div>'

    +'<div style="display:grid;grid-template-rows:1fr 1fr;gap:10px">'
    +'<div class="card"><div class="card-title" style="font-size:.85rem">✂️ Stato Diserbo</div>'
    +donutChart(statoD,['#27ae60','#f39c12','#e74c3c'])
    +'</div>'
    +'<div class="card"><div class="card-title" style="font-size:.85rem">🌿 Stato Verde</div>'
    +donutChart(statoV,['#27ae60','#f39c12','#e74c3c'])
    +'</div>'
    +'</div>'
    +'</div>'

    // RIGA 2: Aree più attive
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'
    +'<div class="card"><div class="card-title" style="color:var(--arancio)">✂️ Aree diserbo più attive</div>'
    +barChart(areeD,'var(--arancio)','interv.')
    +'</div>'
    +'<div class="card"><div class="card-title">🌿 Aree verde più attive</div>'
    +barChart(areeV,'var(--verde)','interv.')
    +'</div>'
    +'</div>'

    // RIGA 3: Lavorazioni più frequenti
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'
    +'<div class="card"><div class="card-title" style="color:var(--arancio)">✂️ Lavorazioni diserbo più frequenti</div>'
    +barChart(lavD,'#e67e22','volte')
    +'</div>'
    +'<div class="card"><div class="card-title">🌿 Lavorazioni verde più frequenti</div>'
    +barChart(lavV,'#2ecc71','volte')
    +'</div>'
    +'</div>'

    // RIGA 4: Ore per mese
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'
    +'<div class="card"><div class="card-title" style="color:var(--arancio)">✂️ Ore uomo diserbo / mese</div>'
    +barChart(oreD6.map(([m,v])=>[m.slice(5)+'/'+m.slice(2,4),parseFloat(v.toFixed(1))]),'var(--arancio)','h')
    +'<div class="text-small mt-8">Totale periodo: <strong>'+oreD.toFixed(1)+' ore</strong> &nbsp;|&nbsp; m²: <strong>'+mqD.toLocaleString('it-IT')+'</strong></div>'
    +'</div>'
    +'<div class="card"><div class="card-title">🌿 Ore uomo verde / mese</div>'
    +barChart(oreV6.map(([m,v])=>[m.slice(5)+'/'+m.slice(2,4),parseFloat(v.toFixed(1))]),'var(--verde)','h')
    +'<div class="text-small mt-8">Totale periodo: <strong>'+oreV.toFixed(1)+' ore</strong> &nbsp;|&nbsp; m²: <strong>'+mqV.toLocaleString('it-IT')+'</strong></div>'
    +'</div>'
    +'</div>'

    )
    +'</div>';
}

// ============ ADMIN ============
function renderAdmin(){
  if(currentUser.ruolo!=='admin')return'<div class="card"><p>Accesso non autorizzato.</p></div>';
  return '<div>'
    +'<div class="admin-grid">'
    +'<div class="admin-section-card"><h4>&#128100; Utenti Sistema</h4><div id="admin-utenti">'+renderAdminUtenti()+'</div>'
    +'<div class="add-form mt-8"><input type="text" id="nu-nome" placeholder="Nome"><input type="text" id="nu-cogn" placeholder="Cognome"><input type="text" id="nu-user" placeholder="Username"><input type="password" id="nu-pass" placeholder="Password"><select id="nu-ruolo"><option value="operatore">Operatore</option><option value="consultazione">Consultazione</option><option value="admin">Admin</option></select><button class="btn btn-verde btn-sm" onclick="addUtente()">+ Aggiungi</button></div></div>'
    +'<div class="admin-section-card"><h4>&#9986;&#65039; Settori Diserbo</h4><div id="admin-sd">'+renderAdminList('settoriDiserbo','sd')+'</div>'
    +'<div class="add-form mt-8"><input type="text" id="new-sd" placeholder="Nome settore"><button class="btn btn-verde btn-sm" onclick="addItem(&apos;settoriDiserbo&apos;,&apos;sd&apos;)">+ Aggiungi</button></div></div>'
    +'<div class="admin-section-card"><h4>&#128506;&#65039; Aree Diserbo</h4><div id="admin-ad">'+renderAdminListAree('areeDiserbo','settoriDiserbo','ad')+'</div>'
    +'<div class="add-form mt-8"><input type="text" id="new-ad-nome" placeholder="Nome area"><input type="number" id="new-ad-mq" placeholder="mq" style="max-width:80px"><select id="new-ad-sett">'+db.settoriDiserbo.filter(s=>s.attivo).map(s=>'<option value="'+s.id+'">'+s.nome+'</option>').join('')+'</select><button class="btn btn-verde btn-sm" onclick="addArea(&apos;areeDiserbo&apos;,&apos;settoriDiserbo&apos;,&apos;ad&apos;)">+ Aggiungi</button></div></div>'
    +'<div class="admin-section-card"><h4>&#128295; Lavorazioni Diserbo</h4><div id="admin-ld">'+renderAdminList('lavorazioniDiserbo','ld')+'</div>'
    +'<div class="add-form mt-8"><input type="text" id="new-ld" placeholder="Nome lavorazione"><button class="btn btn-verde btn-sm" onclick="addItem(&apos;lavorazioniDiserbo&apos;,&apos;ld&apos;)">+ Aggiungi</button></div></div>'
    +'<div class="admin-section-card"><h4>&#127807; Settori Verde</h4><div id="admin-sv">'+renderAdminList('settoriVerde','sv')+'</div>'
    +'<div class="add-form mt-8"><input type="text" id="new-sv" placeholder="Nome settore"><button class="btn btn-verde btn-sm" onclick="addItem(&apos;settoriVerde&apos;,&apos;sv&apos;)">+ Aggiungi</button></div></div>'
    +'<div class="admin-section-card"><h4>&#128506;&#65039; Aree Verde</h4><div id="admin-av">'+renderAdminListAree('areeVerde','settoriVerde','av')+'</div>'
    +'<div class="add-form mt-8"><input type="text" id="new-av-nome" placeholder="Nome area"><input type="number" id="new-av-mq" placeholder="mq" style="max-width:80px"><select id="new-av-sett">'+db.settoriVerde.filter(s=>s.attivo).map(s=>'<option value="'+s.id+'">'+s.nome+'</option>').join('')+'</select><button class="btn btn-verde btn-sm" onclick="addArea(&apos;areeVerde&apos;,&apos;settoriVerde&apos;,&apos;av&apos;)">+ Aggiungi</button></div></div>'
    +'<div class="admin-section-card"><h4>&#128295; Lavorazioni Verde</h4><div id="admin-lv">'+renderAdminList('lavorazioniVerde','lv')+'</div>'
    +'<div class="add-form mt-8"><input type="text" id="new-lv" placeholder="Nome lavorazione"><button class="btn btn-verde btn-sm" onclick="addItem(&apos;lavorazioniVerde&apos;,&apos;lv&apos;)">+ Aggiungi</button></div></div>'
    +'</div>'
    +'<div class="card"><div class="card-title">&#9888;&#65039; Gestione Database &amp; Firebase</div>'
    +'<div class="alert alert-info" style="margin-bottom:10px">&#9728;&#65039; <strong>Stato Firebase:</strong> <span id="fb-status">'+( useFirebase?'&#9989; Connesso — database cloud condiviso':'&#128274; Non configurato — database locale (ogni dispositivo separato)')+'</span></div>'
    +'<div class="flex-row"><button class="btn btn-rosso btn-sm" onclick="if(confirm(&apos;ATTENZIONE: Eliminare TUTTI i dati? Questa operazione non può essere annullata!&apos;))resetDB()">&#128465; Reset completo DB</button>'
    +'<button class="btn btn-grigio btn-sm" onclick="esportaBackup()">&#128229; Backup JSON</button>'
    +'<span class="text-small">Reg. Diserbo: <strong>'+db.registrazioniDiserbo.length+'</strong> &nbsp;| Reg. Verde: <strong>'+db.registrazioniVerde.length+'</strong></span></div></div>'
    +'</div>';
}

function renderAdminUtenti(){
  return db.utenti.map(u=>'<div class="admin-item"><span class="item-name">'+u.nome+' '+u.cognome+' <span class="text-small">('+u.username+') ['+ruoliLabel[u.ruolo]+']</span></span>'
    +'<div class="item-actions">'
    +'<button class="btn btn-sm" style="background:'+(u.attivo?'#d4efdf':'#fadbd8')+';color:var(--grigio)" onclick="toggleItem(&apos;utenti&apos;,this.dataset.id)" data-id="'+u.id+'">'+( u.attivo?'ON':'OFF')+'</button>'
    +(u.id!=='u1'?'<button class="btn btn-rosso btn-sm" onclick="deleteItem(&apos;utenti&apos;,this.dataset.id)" data-id="'+u.id+'">&#128465;</button>':'')
    +'</div></div>').join('');
}
function renderAdminList(tbl,pfx){
  return db[tbl].map(it=>'<div class="admin-item"><span class="item-name" style="'+(it.attivo?'':'opacity:.5;text-decoration:line-through')+'">'+it.nome+'</span>'
    +'<div class="item-actions">'
    +'<button class="btn btn-sm" style="background:'+(it.attivo?'#d4efdf':'#fadbd8')+';color:var(--grigio)" onclick="toggleItem(this.dataset.tbl,this.dataset.id)" data-tbl="'+tbl+'" data-id="'+it.id+'">'+( it.attivo?'ON':'OFF')+'</button>'
    +'<button class="btn btn-rosso btn-sm" onclick="deleteItem(this.dataset.tbl,this.dataset.id)" data-tbl="'+tbl+'" data-id="'+it.id+'">&#128465;</button>'
    +'</div></div>').join('');
}
function renderAdminListAree(tbl,stbl,pfx){
  return db[tbl].map(a=>{const s=db[stbl].find(x=>x.id===a.settoreId);
    return '<div class="admin-item"><span class="item-name" style="'+(a.attivo?'':'opacity:.5;text-decoration:line-through')+'">'+a.nome+' <span class="text-small">'+a.superficie+'mq &mdash; '+(s?s.nome:'')+'</span></span>'
    +'<div class="item-actions">'
    +'<button class="btn btn-sm" style="background:'+(a.attivo?'#d4efdf':'#fadbd8')+';color:var(--grigio)" onclick="toggleItem(this.dataset.tbl,this.dataset.id)" data-tbl="'+tbl+'" data-id="'+a.id+'">'+( a.attivo?'ON':'OFF')+'</button>'
    +'<button class="btn btn-rosso btn-sm" onclick="deleteItem(this.dataset.tbl,this.dataset.id)" data-tbl="'+tbl+'" data-id="'+a.id+'">&#128465;</button>'
    +'</div></div>';}).join('');
}

function addUtente(){
  const nome=document.getElementById('nu-nome').value.trim();
  const cogn=document.getElementById('nu-cogn').value.trim();
  const user=document.getElementById('nu-user').value.trim();
  const pass=document.getElementById('nu-pass').value.trim();
  const ruolo=document.getElementById('nu-ruolo').value;
  if(!nome||!user||!pass){alert('Compilare nome, username e password.');return;}
  if(db.utenti.find(u=>u.username===user)){alert('Username già esistente.');return;}
  db.utenti.push({id:'u'+Date.now(),nome,cognome:cogn,username:user,password:pass,ruolo,attivo:true});
  saveDB();document.getElementById('admin-utenti').innerHTML=renderAdminUtenti();
  ['nu-nome','nu-cogn','nu-user','nu-pass'].forEach(id=>document.getElementById(id).value='');
}
function addItem(tbl,pfx){
  const val=document.getElementById('new-'+pfx).value.trim();
  if(!val){alert('Inserire un nome.');return;}
  db[tbl].push({id:pfx+Date.now(),nome:val,attivo:true});
  saveDB();document.getElementById('admin-'+pfx).innerHTML=renderAdminList(tbl,pfx);
  document.getElementById('new-'+pfx).value='';
}
function addArea(tbl,stbl,pfx){
  const nome=document.getElementById('new-'+pfx+'-nome').value.trim();
  const mq=parseFloat(document.getElementById('new-'+pfx+'-mq').value)||0;
  const sid=document.getElementById('new-'+pfx+'-sett').value;
  if(!nome||!sid){alert('Inserire nome e selezionare settore.');return;}
  db[tbl].push({id:pfx+Date.now(),settoreId:sid,nome,tipologia:'area',superficie:mq,note:'',attivo:true});
  saveDB();document.getElementById('admin-'+pfx).innerHTML=renderAdminListAree(tbl,stbl,pfx);
  document.getElementById('new-'+pfx+'-nome').value='';document.getElementById('new-'+pfx+'-mq').value='';
}
function toggleItem(tbl,id){const it=db[tbl].find(x=>x.id===id);if(it)it.attivo=!it.attivo;saveDB();routeTo('admin');}
function deleteItem(tbl,id){
  if(!confirm('Eliminare definitivamente questo elemento?'))return;
  db[tbl]=db[tbl].filter(x=>x.id!==id);saveDB();routeTo('admin');
}
function resetDB(){db=defaultDB();saveDB();routeTo('admin');}
function esportaBackup(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='somica_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

function navGo(el){routeTo(el.dataset.r);}

// Init Firebase on page load
window.addEventListener('load', initFirebase);
</script>
